openapi: 3.0.0
info:
  title: Athar Project Backend API
  version: 1.1.0
  description: API documentation for authentication, users, and artworks modules.

servers:
  - url: http://localhost:3001/api

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Artworks

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Server healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        "400":
          $ref: '#/components/responses/ValidationError'
        "409":
          $ref: '#/components/responses/ConflictError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/UnauthorizedError'

  /users/profile:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedError'

    patch:
      tags: [Users]
      summary: Update or become artist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BecomeArtistInput'
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Profile updated successfully
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserResponse'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "409":
          $ref: '#/components/responses/ConflictError'

  /users/account:
    delete:
      tags: [Users]
      summary: Delete current user account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedError'

  /artworks:
    get:
      tags: [Artworks]
      summary: List artworks
      parameters:
        - $ref: '#/components/parameters/CategoryQuery'
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/ArtistIdQuery'
      responses:
        "200":
          description: Artworks fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Artworks retrieved successfully
                  data:
                    type: object
                    properties:
                      artworks:
                        type: array
                        items:
                          $ref: '#/components/schemas/ArtworkResponse'

    post:
      tags: [Artworks]
      summary: Create artwork
      description: Requires artist role. Uses multipart/form-data with image files.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateArtworkFormData'
      responses:
        "201":
          description: Artwork created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Artwork created successfully
                  data:
                    type: object
                    properties:
                      artwork:
                        $ref: '#/components/schemas/ArtworkResponse'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "403":
          $ref: '#/components/responses/ForbiddenError'

  /artworks/my-artworks:
    get:
      tags: [Artworks]
      summary: List my artworks
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryQuery'
        - $ref: '#/components/parameters/StatusQuery'
      responses:
        "200":
          description: Artist artworks fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: My artworks retrieved successfully
                  data:
                    type: object
                    properties:
                      artworks:
                        type: array
                        items:
                          $ref: '#/components/schemas/ArtworkResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "403":
          $ref: '#/components/responses/ForbiddenError'

  /artworks/{id}:
    get:
      tags: [Artworks]
      summary: Get artwork by id
      parameters:
        - $ref: '#/components/parameters/ArtworkIdPath'
      responses:
        "200":
          description: Artwork fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Artwork retrieved successfully
                  data:
                    type: object
                    properties:
                      artwork:
                        $ref: '#/components/schemas/ArtworkResponse'
        "404":
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags: [Artworks]
      summary: Update artwork
      description: Requires artist role and artwork ownership. Uses multipart/form-data.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtworkIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateArtworkFormData'
      responses:
        "200":
          description: Artwork updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Artwork updated successfully
                  data:
                    type: object
                    properties:
                      artwork:
                        $ref: '#/components/schemas/ArtworkResponse'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "403":
          $ref: '#/components/responses/ForbiddenError'
        "404":
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [Artworks]
      summary: Soft delete artwork
      description: Marks artwork as inactive (is_active=false).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtworkIdPath'
      responses:
        "200":
          description: Artwork soft deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "403":
          $ref: '#/components/responses/ForbiddenError'
        "404":
          $ref: '#/components/responses/NotFoundError'
        "409":
          $ref: '#/components/responses/ConflictError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ArtworkIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CategoryQuery:
      name: category
      in: query
      required: false
      schema:
        type: string
        enum:
          - لوحات فنية
          - تطريز فلسطيني
          - خزف وفخار
          - خط عربي
          - تصوير فوتوغرافي
          - نحت ومجسمات
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [available, sold, reserved]
    ArtistIdQuery:
      name: artist_id
      in: query
      required: false
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: Ok Healthy
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Something went wrong

    MessageResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operation completed successfully

    SignupInput:
      type: object
      required: [firstName, lastName, email, password, confirmPassword]
      properties:
        firstName:
          type: string
          minLength: 2
          example: Maryam
        lastName:
          type: string
          minLength: 2
          example: Rw
        email:
          type: string
          format: email
          example: maryam@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: Password123!
        confirmPassword:
          type: string
          format: password
          minLength: 8
          example: Password123!

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: maryam@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: Password123!

    AuthSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Login successful
        data:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
            user:
              $ref: '#/components/schemas/UserResponse'

    SocialMediaItem:
      type: object
      required: [platform, url]
      properties:
        platform:
          type: string
          enum: [instagram, facebook, linkedin, pinterest, x]
        url:
          type: string
          format: uri

    BecomeArtistInput:
      type: object
      required: [artistName, bio, location, phone]
      properties:
        artistName:
          type: string
          minLength: 3
          example: Basmala
        bio:
          type: string
          minLength: 20
          maxLength: 1000
        location:
          type: string
          minLength: 3
          maxLength: 255
          example: Nablus
        phone:
          type: string
          maxLength: 50
          example: "0591234567"
        socialMedia:
          type: array
          items:
            $ref: '#/components/schemas/SocialMediaItem'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, artist]
        artistName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        socialMedia:
          type: array
          items:
            $ref: '#/components/schemas/SocialMediaItem'

    ArtworkImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        alt_text:
          type: string
          nullable: true
        is_featured:
          type: boolean
        sort_order:
          type: integer

    ArtworkArtistInfo:
      type: object
      properties:
        artist_name:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true

    ArtworkResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum:
            - لوحات فنية
            - تطريز فلسطيني
            - خزف وفخار
            - خط عربي
            - تصوير فوتوغرافي
            - نحت ومجسمات
        artist_id:
          type: string
          format: uuid
        price:
          type: number
        quantity:
          type: integer
        status:
          type: string
          enum: [available, sold, reserved]
        is_active:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        users:
          oneOf:
            - $ref: '#/components/schemas/ArtworkArtistInfo'
            - type: array
              items:
                $ref: '#/components/schemas/ArtworkArtistInfo'
        artwork_images:
          type: array
          items:
            $ref: '#/components/schemas/ArtworkImage'

    CreateArtworkFormData:
      type: object
      required: [title, description, category, price, quantity, images]
      properties:
        title:
          type: string
          minLength: 2
        description:
          type: string
          minLength: 10
        category:
          type: string
          enum:
            - لوحات فنية
            - تطريز فلسطيني
            - خزف وفخار
            - خط عربي
            - تصوير فوتوغرافي
            - نحت ومجسمات
        price:
          type: number
          minimum: 0
        quantity:
          type: integer
          minimum: 0
        mainImageIndex:
          type: integer
          minimum: 0
          example: 0
        images:
          type: array
          maxItems: 5
          items:
            type: string
            format: binary

    UpdateArtworkFormData:
      type: object
      properties:
        title:
          type: string
          minLength: 2
        description:
          type: string
          minLength: 10
        category:
          type: string
          enum:
            - لوحات فنية
            - تطريز فلسطيني
            - خزف وفخار
            - خط عربي
            - تصوير فوتوغرافي
            - نحت ومجسمات
        price:
          type: number
          minimum: 0
        quantity:
          type: integer
          minimum: 0
        mainImageIndex:
          type: integer
          minimum: 0
        existingImages:
          description: Repeat this field for each existing filename to keep.
          type: array
          items:
            type: string
        imageOrder:
          description: Repeat values like existing:<filename> or new:<index>.
          type: array
          items:
            type: string
        images:
          type: array
          maxItems: 5
          items:
            type: string
            format: binary