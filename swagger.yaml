openapi: 3.0.0
info:
  title: backend
  version: 1.0.0
  description: Athar Project Backend
servers:
  - url: http://localhost:3001/api

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User account endpoints

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the health status of the server
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Ok Healthy
                  timestamp:
                    type: string
                    example: "2024-01-01T00:00:00.000Z"

  /auth/signup:
    post:
      tags:
        - Auth
      summary: User signup
      description: Create a new user account via signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User created successfully
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "12345"
                          email:
                            type: string
                            example: maryam@example.com
                          role:
                            type: string
                            example: user
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: email
                        message:
                          type: string
                          example: Invalid email address
        "409":
          description: Duplicate email
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Please check your email
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Internal server error

  /auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: Authenticate an existing user and return a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "12345"
                          email:
                            type: string
                            example: maryam@example.com
                          role:
                            type: string
                            example: user
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: email
                        message:
                          type: string
                          example: Invalid email address
        "401":
          description: Invalid login credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Invalid email or password
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Internal server error

  /users/me:
    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete the currently authenticated user account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Account deleted successfully
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Unauthorized
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Internal server error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SignupInput:
      type: object
      properties:
        firstName:
          type: string
          example: maryam
        lastName:
          type: string
          example: rw
        email:
          type: string
          format: email
          example: maryam@example.com
        password:
          type: string
          format: password
          example: Password123!
        confirmPassword:
          type: string
          format: password
          example: Password123!
      required:
        - firstName
        - lastName
        - email
        - password
        - confirmPassword

    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
          example: maryam@example.com
        password:
          type: string
          format: password
          example: Password123!
      required:
        - email
        - password