openapi: 3.0.0
info:
  title: backend
  version: 1.0.0
  description: Athar Project Backend
servers:
  - url: http://localhost:3001/api

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the health status of the server
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    example: "2024-01-01T00:00:00.000Z"

  /auth/signup:
    post:
      summary: User signup
      description: Create a new user account via signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully
                  userId:
                    type: string
                    example: "12345"
        "400":
          description: Invalid signup input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Validation failed
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
components:
  schemas:
    SignupInput:
      type: object
      properties:
        firstName:
          type: string
          example: maryam
        lastName:
          type: string
          example: rw
        email:
          type: string
          format: email
          example: maryam@example.com
        password:
          type: string
          format: password
          example: Password123!
        confirmPassword:
          type: string
          format: password
          example: Password123!
      required:
        - firstName
        - lastName
        - email
        - password
        - confirmPassword